<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F3F4F6;
            --surface: #FFFFFF;
            --text-main: #111827;
            --text-light: #6B7280;
            --border: #E5E7EB;
            --danger: #EF4444;
            --danger-hover: #DC2626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container { max-width: 900px; width: 100%; }
        h1 { font-size: 2rem; margin-bottom: 2rem; text-align: center; }

        .card {
            background: var(--surface);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }

        h2 { font-size: 1.25rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }

        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input {
            width: 100%; padding: 0.75rem; border: 1px solid var(--border);
            border-radius: 6px; font-size: 1rem; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }

        .buttons { display: flex; gap: 1rem; margin-top: 1rem; }
        button {
            background-color: var(--primary); color: white; border: none;
            padding: 0.75rem 1.5rem; border-radius: 6px; font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        button.cancel { background-color: var(--text-light); }
        button.cancel:hover { background-color: #4B5563; display: none; }
        button.delete { background-color: var(--danger); padding: 0.4rem 0.8rem; font-size: 0.875rem; }
        button.delete:hover { background-color: var(--danger-hover); }

        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { background-color: var(--bg); font-weight: 600; color: var(--text-light); }
        tr:hover td { background-color: #F9FAFB; }

        .alert { display: none; padding: 1rem; border-radius: 6px; margin-bottom: 1rem; }
        .alert.active { display: block; }
        .alert.success { background-color: #D1FAE5; color: #065F46; }
        .alert.error { background-color: #FEE2E2; color: #991B1B; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gestión de Usuarios</h1>

        <div id="alertBox" class="alert"></div>

        <div class="card">
            <h2 id="formTitle">Crear Nuevo Usuario</h2>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label for="userName">Nombre de Usuario</label>
                    <input type="text" id="userName" required placeholder="Ej: Maria Lopez">
                </div>
                <div class="form-group">
                    <label for="userEmail">Correo Electrónico</label>
                    <input type="email" id="userEmail" required placeholder="Ej: maria@example.com">
                </div>
                <div class="buttons">
                    <button type="submit" id="submitBtn">Guardar Usuario</button>
                    <button type="button" id="cancelBtn" class="cancel" style="display:none;">Cancelar</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h2>Lista de Usuarios Registrados</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="usersList">
                    <tr><td colspan="4" style="text-align: center;">Cargando usuarios...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
